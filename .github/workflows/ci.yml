name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "31 7 * * 3"

permissions:
  contents: read

jobs:
  lint:
    name: Lint Codebase
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Lint Codebase
        id: super-linter
        uses: super-linter/super-linter/slim@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          DEFAULT_BRANCH: main
          FILTER_REGEX_EXCLUDE: dist/**/*
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LINTER_RULES_PATH: ${{ github.workspace }}
          # Fallback DB registries for intermittent mirror.gcr.io outages.
          TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2,public.ecr.aws/aquasecurity/trivy-db:2
          VALIDATE_ALL_CODEBASE: true
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JSCPD: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_JSON: false
          VALIDATE_JAVASCRIPT_PRETTIER: false
          VALIDATE_TYPESCRIPT_PRETTIER: false
          VALIDATE_JSON_PRETTIER: false
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_CHECKOV: false # not relevant as we don't use IaC
          VALIDATE_NATURAL_LANGUAGE: false

  test:
    name: Test (Node ${{ matrix.node }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        node:
          - 22.14.0
          - 24.14.1

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # npm <11 mishandles optional native deps (npm/cli#4828), which breaks
      # vitest's rolldown binary on the Node 22 line; match the release job's npm.
      - name: Upgrade npm
        run: npm install -g npm@11.16.0

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Check
        id: check
        run: npm run check

      - name: Test
        id: test
        run: npm run test

  check-dist:
    name: Check dist/
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: install
        run: npm ci

      - name: Build dist/ Directory and Compare
        id: diff
        run: bash scripts/check-dist.sh

      - if: ${{ failure() && steps.diff.outcome == 'failure' }}
        name: Upload Artifact
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  codeql:
    name: CodeQL Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      checks: write
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - TypeScript

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        id: initialize
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          source-root: src

      - name: Autobuild
        id: autobuild
        uses: github/codeql-action/autobuild@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3

  ci:
    name: CI
    if: github.event_name != 'schedule'
    needs:
      - lint
      - test
      - check-dist
      - codeql
    runs-on: ubuntu-latest
    environment: ci
    permissions:
      contents: read

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Build CLI
        id: build-cli
        run: npm run package

      - name: Generate Auth Cookie
        id: auth-cookie
        if: github.actor != 'dependabot[bot]'
        run: |
          curl -s -o /dev/null \
            -X POST https://xcelera.dev/api/v1/session \
            -H 'Authorization: Bearer ${{ secrets.XCELERA_TOKEN }}' \
            -c cookies.txt

      - name: Run CLI
        id: run-cli
        if: github.actor != 'dependabot[bot]'
        run: node dist/cli.js audit --ref xcelera-dev-account-notifications-TXC5 --cookie-file cookies.txt
        env:
          XCELERA_TOKEN: ${{ secrets.XCELERA_TOKEN }}
          DEBUG: true

      - name: Test Local Action
        id: test-action
        if: github.actor != 'dependabot[bot]'
        uses: ./
        with:
          ref: xcelera-dev-account-Q77Z
          token: ${{ secrets.XCELERA_TOKEN }}
          cookie-file: cookies.txt

      - name: Cleanup Auth Cookie
        id: cleanup-cookie
        if: github.actor != 'dependabot[bot]'
        run: rm -f cookies.txt

      - name: Print Output
        id: output
        if: github.actor != 'dependabot[bot]' # Dependabot doesn't have access to secrets
        run: echo "${STEPS_TEST_ACTION_OUTPUTS_STATUS}"
        env:
          STEPS_TEST_ACTION_OUTPUTS_STATUS: ${{ steps.test-action.outputs.status }}

  release:
    name: Release
    needs:
      - ci
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm clean-install

      - name: Verify the integrity of provenance attestations and registry
          signatures for installed dependencies
        run: npm audit signatures

      - name: package
        run: npm run package

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
